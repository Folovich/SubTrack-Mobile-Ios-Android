openapi: 3.0.3
info:
  title: SubTrack API
  version: 0.1.0
  description: MVP backend contract for SubTrack demo.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/v1/auth/register:
    post:
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation or business error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiErrorResponse'
                  - $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/auth/login:
    post:
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/users/me:
    get:
      tags: [users]
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
  /api/v1/dashboard:
    get:
      tags: [dashboard]
      parameters:
        - in: query
          name: period
          required: false
          schema:
            type: string
            enum: [month, year]
            default: month
        - in: query
          name: days
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 7
      responses:
        '200':
          description: Aggregated dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '400':
          description: Invalid period or days
  /api/v1/categories:
    get:
      tags: [categories]
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
  /api/v1/integrations:
    get:
      tags: [integrations]
      responses:
        '200':
          description: Connected integrations for current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IntegrationConnectionResponse'
  /api/v1/integrations/{provider}:
    get:
      tags: [integrations]
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [GMAIL]
      responses:
        '200':
          description: Current mailbox connection status for provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationConnectionResponse'
        '400':
          description: Invalid or unsupported provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/integrations/{provider}/oauth/start:
    post:
      tags: [integrations]
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [GMAIL]
      responses:
        '200':
          description: OAuth authorization URL for provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthStartResponse'
        '400':
          description: Provider is unsupported or mailbox flow feature flag is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/integrations/{provider}/oauth/callback:
    get:
      tags: [integrations]
      security: []
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [GMAIL]
        - in: query
          name: code
          required: false
          schema:
            type: string
        - in: query
          name: state
          required: false
          schema:
            type: string
        - in: query
          name: error
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirects to frontend with `gmail` status and optional safe `reason`.
        '400':
          description: Provider is unsupported or mailbox flow feature flag is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/integrations/{provider}/disconnect:
    post:
      tags: [integrations]
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [GMAIL]
      responses:
        '200':
          description: Provider mailbox disconnected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationConnectionResponse'
        '400':
          description: Invalid or unsupported provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/recommendations:
    get:
      tags: [recommendations]
      parameters:
        - in: query
          name: category
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Alternative service recommendations for category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecommendationResponse'
  /api/v1/subscriptions:
    get:
      tags: [subscriptions]
      responses:
        '200':
          description: Subscriptions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubscriptionResponse'
    post:
      tags: [subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
      responses:
        '200':
          description: Created subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
  /api/v1/subscriptions/upcoming:
    get:
      tags: [subscriptions]
      parameters:
        - in: query
          name: days
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 7
      responses:
        '200':
          description: Active subscriptions with upcoming charges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UpcomingSubscriptionResponse'
  /api/v1/subscriptions/{id}:
    get:
      tags: [subscriptions]
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      responses:
        '200':
          description: Subscription by id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
    put:
      tags: [subscriptions]
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
      responses:
        '200':
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
    delete:
      tags: [subscriptions]
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      responses:
        '200':
          description: Deleted
  /api/v1/notifications:
    get:
      tags: [notifications]
      parameters:
        - in: query
          name: days
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 7
      responses:
        '200':
          description: Notifications for window today..today+days (UPCOMING_CHARGE, PRICE_CHANGE, INACTIVITY)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationResponse'
  /api/v1/usage-signals:
    post:
      tags: [usage-signals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageSignalCreateRequest'
      responses:
        '200':
          description: Created usage signal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSignalResponse'
        '400':
          description: Validation or business error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiErrorResponse'
                  - $ref: '#/components/schemas/ValidationErrorResponse'
    get:
      tags: [usage-signals]
      parameters:
        - in: query
          name: subscriptionId
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Usage signals for current user ordered by createdAt desc
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsageSignalResponse'
        '400':
          description: Subscription not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/analytics/summary:
    get:
      tags: [analytics]
      parameters:
        - in: query
          name: period
          required: true
          schema:
            type: string
            enum: [month, year]
      responses:
        '200':
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSummaryResponse'
        '400':
          description: Invalid period
  /api/v1/analytics/by-category:
    get:
      tags: [analytics]
      parameters:
        - in: query
          name: period
          required: true
          schema:
            type: string
            enum: [month, year]
      responses:
        '200':
          description: Analytics by category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsByCategoryResponse'
        '400':
          description: Invalid period
  /api/v1/analytics/forecast:
    get:
      tags: [analytics]
      responses:
        '200':
          description: Monthly and yearly forecast
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsForecastResponse'
  /api/v1/analytics/usage:
    get:
      tags: [analytics]
      parameters:
        - in: query
          name: period
          required: true
          schema:
            type: string
            enum: [month, year]
        - in: query
          name: subscriptionId
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Usage analytics by active subscriptions for period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsUsageResponse'
        '400':
          description: Invalid period or subscriptionId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/forecast:
    get:
      tags: [forecast]
      deprecated: true
      description: Deprecated compatibility alias. Uses the same calculation as /api/v1/analytics/forecast.
      parameters:
        - in: query
          name: months
          required: false
          deprecated: true
          schema:
            type: integer
            default: 12
          description: Deprecated. Kept for backward compatibility and ignored by calculation logic.
      responses:
        '200':
          description: Forecast (legacy shape)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastResponse'
  /api/v1/consents/imports/{provider}:
    get:
      tags: [consents]
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [GMAIL]
      responses:
        '200':
          description: Current consent state for import provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportConsentStatusResponse'
        '400':
          description: Invalid or unsupported provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/consents/imports/{provider}/grant:
    post:
      tags: [consents]
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [GMAIL]
      responses:
        '200':
          description: Consent granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportConsentStatusResponse'
        '400':
          description: Invalid or unsupported provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/consents/imports/{provider}/revoke:
    post:
      tags: [consents]
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [GMAIL]
      responses:
        '200':
          description: Consent revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportConsentStatusResponse'
        '400':
          description: Invalid or unsupported provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/imports/start:
    post:
      tags: [imports]
      description: Requires active consent for requested provider. Grant via /api/v1/consents/imports/{provider}/grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportStartRequest'
            examples:
              success:
                summary: Fully successful import
                value:
                  provider: GMAIL
                  messages:
                    - externalId: gmail-msg-success-001
                      from: billing@netflix.com
                      subject: Netflix renewal notice
                      body: "Your Netflix renewal is scheduled for 2026-03-20. Amount: 9.99 USD"
                      receivedAt: 2026-03-08T10:00:00Z
                    - externalId: gmail-msg-success-002
                      from: billing@netflix.com
                      subject: Netflix renewal notice
                      body: "Your Netflix renewal is scheduled for 2026-04-20. Amount: 9.99 USD"
                      receivedAt: 2026-03-08T10:05:00Z
              partial:
                summary: Partial import with parser errors
                value:
                  provider: GMAIL
                  messages:
                    - externalId: gmail-msg-partial-001
                      from: billing@netflix.com
                      subject: Netflix renewal notice
                      body: "Your Netflix renewal is scheduled for 2026-03-22. Amount: 9.99 USD"
                      receivedAt: 2026-03-08T11:00:00Z
                    - externalId: gmail-msg-partial-002
                      from: billing@netflix.com
                      subject: Netflix renewal notice
                      body: "Amount: 9.99 USD"
                      receivedAt: 2026-03-08T11:01:00Z
                    - externalId: gmail-msg-partial-003
                      from: no-reply@example.com
                      subject: Monthly statement
                      body: Payment details enclosed
                      receivedAt: 2026-03-08T11:02:00Z
              fail:
                summary: Full failure (all messages invalid for parser)
                value:
                  provider: GMAIL
                  messages:
                    - externalId: gmail-msg-fail-001
                      from: no-reply@example.com
                      subject: Your receipt
                      body: "Amount: 9.99 USD"
                      receivedAt: 2026-03-08T12:00:00Z
                    - externalId: gmail-msg-fail-002
                      from: billing@netflix.com
                      subject: Netflix notice
                      body: Renewal amount 9.99 USD
                      receivedAt: 2026-03-08T12:01:00Z
      responses:
        '200':
          description: Import finished (sync MVP)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResultResponse'
        '400':
          description: Invalid provider or broken request payload
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiErrorResponse'
                  - $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                unsupportedProvider:
                  summary: Provider is not supported in MVP
                  value:
                    message: only GMAIL provider is supported in MVP
                validationError:
                  summary: DTO validation error
                  value:
                    message: Validation failed
                    errors:
                      messages[0].externalId: externalId may contain only letters, digits, dot, underscore, colon and hyphen
                      messages[0].from: from must be a valid email address
        '403':
          description: Import consent is missing for provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportConsentErrorResponse'
              examples:
                consentRequired:
                  summary: Import blocked without active consent
                  value:
                    code: IMPORT_CONSENT_REQUIRED
                    message: active consent is required before import for provider GMAIL
                    provider: GMAIL
  /api/v1/imports/{provider}/sync:
    post:
      tags: [imports]
      description: Synchronizes supported mailbox provider and runs import pipeline.
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [GMAIL]
      responses:
        '200':
          description: Mailbox sync finished (sync MVP)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResultResponse'
        '400':
          description: Invalid provider or mailbox flow is disabled by feature flag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Import consent is missing for provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportConsentErrorResponse'
        '409':
          description: Mailbox is not connected or requires OAuth reconnect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailboxFlowErrorResponse'
  /api/v1/imports:
    get:
      tags: [imports]
      responses:
        '200':
          description: Import history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImportHistoryItemResponse'
  /api/v1/imports/{id}:
    get:
      tags: [imports]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Import job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResultResponse'
        '400':
          description: Import job not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    SubscriptionId:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    ApiErrorResponse:
      type: object
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: string
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          maxLength: 100
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
          nullable: true
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'
    UserProfileResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        timezone:
          type: string
          nullable: true
    DashboardResponse:
      type: object
      properties:
        summary:
          $ref: '#/components/schemas/AnalyticsSummaryResponse'
        forecast:
          $ref: '#/components/schemas/AnalyticsForecastResponse'
        byCategory:
          $ref: '#/components/schemas/AnalyticsByCategoryResponse'
        upcoming:
          type: array
          items:
            $ref: '#/components/schemas/UpcomingSubscriptionResponse'
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/NotificationResponse'
    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    IntegrationConnectionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        provider:
          type: string
        status:
          type: string
        externalAccountEmail:
          type: string
          format: email
          nullable: true
        connectedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
        lastSyncAt:
          type: string
          format: date-time
          nullable: true
        lastErrorCode:
          type: string
          nullable: true
        lastErrorMessage:
          type: string
          nullable: true
    OAuthStartResponse:
      type: object
      properties:
        provider:
          type: string
        authorizationUrl:
          type: string
          format: uri
    RecommendationResponse:
      type: object
      properties:
        category:
          type: string
        currentService:
          type: string
        alternativeService:
          type: string
        reason:
          type: string
    SubscriptionRequest:
      type: object
      required: [serviceName, amount, currency, billingPeriod, nextBillingDate]
      properties:
        serviceName:
          type: string
          maxLength: 255
        categoryId:
          type: integer
          format: int64
          nullable: true
        amount:
          type: number
          format: double
        currency:
          type: string
          minLength: 3
          maxLength: 3
        billingPeriod:
          type: string
          enum: [WEEKLY, MONTHLY, QUARTERLY, YEARLY]
        nextBillingDate:
          type: string
          format: date
        status:
          type: string
          enum: [ACTIVE, PAUSED, CANCELED]
          nullable: true
    SubscriptionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        serviceName:
          type: string
        category:
          type: string
          nullable: true
        amount:
          type: number
          format: double
        currency:
          type: string
        billingPeriod:
          type: string
          enum: [WEEKLY, MONTHLY, QUARTERLY, YEARLY]
        nextBillingDate:
          type: string
          format: date
        status:
          type: string
          enum: [ACTIVE, PAUSED, CANCELED]
    UpcomingSubscriptionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        serviceName:
          type: string
        category:
          type: string
          nullable: true
        amount:
          type: number
          format: double
        currency:
          type: string
        billingPeriod:
          type: string
          enum: [WEEKLY, MONTHLY, QUARTERLY, YEARLY]
        nextBillingDate:
          type: string
          format: date
        status:
          type: string
          enum: [ACTIVE, PAUSED, CANCELED]
        daysUntilBilling:
          type: integer
          format: int64
    NotificationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum: [UPCOMING_CHARGE, PRICE_CHANGE, INACTIVITY]
        message:
          type: string
        scheduledAt:
          type: string
        status:
          type: string
    UsageSignalCreateRequest:
      type: object
      required: [subscriptionId, signalType, value]
      properties:
        subscriptionId:
          type: integer
          format: int64
          minimum: 1
        signalType:
          type: string
          minLength: 1
          maxLength: 50
        value:
          type: string
          minLength: 1
          maxLength: 255
    UsageSignalResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        subscriptionId:
          type: integer
          format: int64
        signalType:
          type: string
        value:
          type: string
        createdAt:
          type: string
          format: date-time
    AnalyticsSummaryResponse:
      type: object
      properties:
        period:
          type: string
          enum: [month, year]
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        totalAmount:
          type: number
          format: double
        activeSubscriptions:
          type: integer
          format: int64
        currency:
          type: string
          nullable: true
    AnalyticsByCategoryResponse:
      type: object
      properties:
        period:
          type: string
          enum: [month, year]
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        totalAmount:
