          type: string
          enum: [GMAIL]
    ImportStartRequest:
      type: object
      required: [provider, messages]
      properties:
        provider:
          type: string
          enum: [GMAIL]
          description: Only GMAIL is supported in MVP import flow and requires active consent.
        messages:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/MailMessageRequest'
    MailMessageRequest:
      type: object
      required: [externalId, from, subject, body, receivedAt]
      properties:
        externalId:
          type: string
          maxLength: 255
          pattern: '^[A-Za-z0-9._:-]{1,255}$'
        from:
          type: string
          format: email
          maxLength: 255
        subject:
          type: string
          maxLength: 500
        body:
          type: string
          maxLength: 10000
        receivedAt:
          type: string
          format: date-time
    ImportResultResponse:
      type: object
      properties:
        jobId:
          type: integer
          format: int64
        provider:
          type: string
        status:
          type: string
          enum: [IN_PROGRESS, COMPLETED, COMPLETED_WITH_ERRORS, FAILED]
        processed:
          type: integer
          format: int32
        created:
          type: integer
          format: int32
        skipped:
          type: integer
          format: int32
        errors:
          type: integer
          format: int32
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        errorItems:
          type: array
          items:
            $ref: '#/components/schemas/ImportErrorItemResponse'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ImportItemResultResponse'
      example:
        jobId: 42
        provider: GMAIL
        status: COMPLETED_WITH_ERRORS
        processed: 3
        created: 1
        skipped: 1
        errors: 1
        startedAt: 2026-03-08T10:00:00Z
        finishedAt: 2026-03-08T10:00:01Z
        errorItems:
          - externalId: gmail-msg-003
            reason: parser could not extract next billing date (expected YYYY-MM-DD)
        items:
          - externalId: gmail-msg-001
            status: IMPORTED
            reason: null
            sourceProvider: netflix.com
            serviceName: Netflix
            amount: 9.99
            currency: USD
            billingPeriod: MONTHLY
            nextBillingDate: 2026-03-20
            category: Entertainment
            receivedAt: 2026-03-08T10:00:00Z
          - externalId: gmail-msg-003
            status: PARSE_ERROR
            reason: parser could not extract next billing date (expected YYYY-MM-DD)
            sourceProvider: netflix.com
            serviceName: Netflix
            amount: null
            currency: null
            billingPeriod: null
            nextBillingDate: null
            category: Entertainment
            receivedAt: 2026-03-08T10:01:00Z
