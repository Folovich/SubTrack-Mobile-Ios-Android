spring:
  application:
    name: subscription-manager-backend
  config:
    import: optional:file:.env[.properties],optional:file:apps/backend/.env[.properties],optional:file:../.env[.properties],optional:file:../apps/backend/.env[.properties],optional:file:../../.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/subtrack}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:subtrack}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:subtrack}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:${BACKEND_PORT:8080}}

app:
  jwt:
    secret: ${JWT_SECRET:subtrack-dev-secret-change-me-at-least-32-bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:19006}
  security:
    login:
      rate-limit:
        max-attempts: ${APP_SECURITY_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:20}
        window: ${APP_SECURITY_LOGIN_RATE_LIMIT_WINDOW:1m}
      brute-force:
        max-failures: ${APP_SECURITY_LOGIN_BRUTE_FORCE_MAX_FAILURES:5}
        cooldown: ${APP_SECURITY_LOGIN_BRUTE_FORCE_COOLDOWN:15m}
        entry-ttl: ${APP_SECURITY_LOGIN_BRUTE_FORCE_ENTRY_TTL:24h}
  notifications:
    inactivity-days: ${NOTIFICATION_INACTIVITY_DAYS:14}
  integrations:
    security:
      token-encryption-secret: ${INTEGRATIONS_TOKEN_ENCRYPTION_SECRET:${JWT_SECRET:subtrack-dev-secret-change-me-at-least-32-bytes}}
      oauth-state-secret: ${INTEGRATIONS_OAUTH_STATE_SECRET:${JWT_SECRET:subtrack-dev-secret-change-me-at-least-32-bytes}}
      oauth-state-cleanup:
        enabled: ${INTEGRATIONS_OAUTH_STATE_CLEANUP_ENABLED:true}
        cron: ${INTEGRATIONS_OAUTH_STATE_CLEANUP_CRON:0 30 * * * *}
        retention-days: ${INTEGRATIONS_OAUTH_STATE_RETENTION_DAYS:30}
    gmail:
      client-id: ${GMAIL_CLIENT_ID:}
      client-secret: ${GMAIL_CLIENT_SECRET:}
      redirect-uri: ${GMAIL_REDIRECT_URI:http://localhost:8080/api/v1/integrations/GMAIL/oauth/callback}
      frontend-redirect-uri: ${GMAIL_FRONTEND_REDIRECT_URI:http://localhost:5173/import}
      authorization-uri: ${GMAIL_AUTHORIZATION_URI:https://accounts.google.com/o/oauth2/v2/auth}
      token-uri: ${GMAIL_TOKEN_URI:https://oauth2.googleapis.com/token}
      revoke-uri: ${GMAIL_REVOKE_URI:https://oauth2.googleapis.com/revoke}
      gmail-api-base-url: ${GMAIL_API_BASE_URL:https://gmail.googleapis.com/gmail/v1}
      scope: ${GMAIL_SCOPE:https://www.googleapis.com/auth/gmail.readonly}
      state-ttl-minutes: ${GMAIL_STATE_TTL_MINUTES:10}
      max-results: ${GMAIL_MAX_RESULTS:50}
      initial-lookback-days: ${GMAIL_INITIAL_LOOKBACK_DAYS:365}
      startup-validation-enabled: ${IMPORT_PROVIDERS_GMAIL_MAILBOX_STARTUP_VALIDATION_ENABLED:true}

import:
  providers:
    gmail:
      enabled: ${IMPORT_PROVIDERS_GMAIL_ENABLED:true}
      mailbox-enabled: ${IMPORT_PROVIDERS_GMAIL_MAILBOX_ENABLED:false}
    yandex:
      enabled: ${IMPORT_PROVIDERS_YANDEX_ENABLED:false}
    mail-ru:
      enabled: ${IMPORT_PROVIDERS_MAIL_RU_ENABLED:false}
    bank-api:
      enabled: ${IMPORT_PROVIDERS_BANK_API_ENABLED:false}
