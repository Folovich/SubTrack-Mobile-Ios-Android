version: "3.9"

services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: subtrack
      POSTGRES_USER: subtrack
      POSTGRES_PASSWORD: subtrack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subtrack -d subtrack"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ../apps/backend
      dockerfile: ../../infra/docker/backend.Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/subtrack
      SPRING_DATASOURCE_USERNAME: subtrack
      SPRING_DATASOURCE_PASSWORD: subtrack
      JWT_SECRET: subtrack-dev-secret-change-me-at-least-32-bytes
      IMPORT_PROVIDERS_GMAIL_ENABLED: ${IMPORT_PROVIDERS_GMAIL_ENABLED:-true}
      IMPORT_PROVIDERS_GMAIL_MAILBOX_ENABLED: ${IMPORT_PROVIDERS_GMAIL_MAILBOX_ENABLED:-true}
      IMPORT_PROVIDERS_GMAIL_MAILBOX_STARTUP_VALIDATION_ENABLED: ${IMPORT_PROVIDERS_GMAIL_MAILBOX_STARTUP_VALIDATION_ENABLED:-false}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REDIRECT_URI: ${GMAIL_REDIRECT_URI:-http://localhost:8080/api/v1/integrations/GMAIL/oauth/callback}
      GMAIL_FRONTEND_REDIRECT_URI: ${GMAIL_FRONTEND_REDIRECT_URI:-http://localhost:5173/import}
      INTEGRATIONS_TOKEN_ENCRYPTION_SECRET: ${INTEGRATIONS_TOKEN_ENCRYPTION_SECRET:-subtrack-dev-secret-change-me-at-least-32-bytes}
      INTEGRATIONS_OAUTH_STATE_SECRET: ${INTEGRATIONS_OAUTH_STATE_SECRET:-subtrack-dev-secret-change-me-at-least-32-bytes}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../apps/web
      dockerfile: ../../infra/docker/web.Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
