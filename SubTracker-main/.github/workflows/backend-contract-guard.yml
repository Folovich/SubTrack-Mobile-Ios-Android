name: backend-contract-guard

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "docs/api-notes/**"
      - "scripts/contracts/**"
      - "README.md"
      - "BACKEND_HANDOFF.md"
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "docs/api-notes/**"
      - "scripts/contracts/**"
      - "README.md"
      - "BACKEND_HANDOFF.md"

jobs:
  contract-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: OpenAPI breaking diff
        shell: pwsh
        run: ./scripts/contracts/check-openapi-breaking.ps1

      - name: Backend API contract tests
        working-directory: apps/backend
        run: ./gradlew test --tests "*ContractTest" --no-daemon
